Camera.width: 1280
Camera.height: 1024

Camera.fps: 10

Camera.RGB: 1

Stereo.ThDepth: 100.0

# Atlas persistence (saved on Shutdown / Ctrl+C)
System.SaveAtlasToFile: "GeoScan_B1"

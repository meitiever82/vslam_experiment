# GeoScan B1 双目鱼眼相机配置
# 标定来源: Kalibr (pinhole-equi 模型)

cuvslam_ros:
  ros__parameters:
    # Topics (B1 bag)
    left_image_topic: "/left_camera/image"
    right_image_topic: "/right_camera/image"
    imu_topic: "/handsfree/imu_ms2"              # 经 scripts/imu_accel_g_to_ms2.py 转换 (FB100 原始 g 单位 → m/s²)
    camera_info_topic: ""

    # Frame IDs
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    camera_frame_id: "camera_link"

    # ---- Left camera (cam0) intrinsics ----
    image_width: 1280
    image_height: 1024
    fx: 465.30269231092973
    fy: 464.44407907099975
    cx: 646.2240734070592
    cy: 486.9358630691829
    distortion_model: "fisheye"
    distortion_coeffs: [-0.0313464513145838, 0.03307070111936863, -0.03358616295118505, 0.010940367109062672]

    # ---- Right camera (cam1) intrinsics ----
    right_fx: 462.6532257342507
    right_fy: 461.95322655028104
    right_cx: 622.1567016653636
    right_cy: 541.5480235419994
    right_distortion_coeffs: [0.017052626877708536, -0.08393575674877075, 0.07290533443221045, -0.02151514779076789]

    # ---- Stereo extrinsics: rig_from_cam1 = T_cam0_cam1 = inv(T_cn_cnm1) ----
    # Quaternion derived from the same rotation matrix ORB-SLAM3 uses
    # (GeoScan_fisheye.yaml Stereo.T_c1_c2). Dominant component is a ~0.73°
    # roll around X; prior value was missing it and caused fast tracking loss.
    rig_from_cam1_qx: -0.006382
    rig_from_cam1_qy:  0.000441
    rig_from_cam1_qz: -0.000351
    rig_from_cam1_qw:  0.999979
    rig_from_cam1_tx: 0.09738513291064156
    rig_from_cam1_ty: -0.00000849
    rig_from_cam1_tz: 0.00087507

    # ---- IMU extrinsics: rig_from_imu = T_cam0_imu (from geoscan_camchain-imucam.yaml) ----
    # Rotation matrix → quaternion (90° axis swap between FB100 IMU and OpenCV camera frame)
    rig_from_imu_qx:  0.4956238075160589
    rig_from_imu_qy: -0.5025380296879657
    rig_from_imu_qz:  0.5070427100395011
    rig_from_imu_qw:  0.4946920761550378
    rig_from_imu_tx:  0.049964968131415
    rig_from_imu_ty:  0.014075898634306
    rig_from_imu_tz: -0.053596837940903

    # ---- IMU noise (Kalibr-标定的 FB100 真值, calibration/Geoscan-20251211/fb100-imu.yaml) ----
    gyroscope_noise_density: 1.87e-4
    gyroscope_random_walk:   2.66e-5
    accelerometer_noise_density: 1.86e-3
    accelerometer_random_walk:   4.33e-4
    imu_frequency: 800.0    # Kalibr update_rate; 实测 ~780Hz

    # Tracker
    odometry_mode: "inertial"        # stereo-inertial (FB100 /handsfree/imu_ms2, bag 前 20s 静止段用于 gravity/bias init)
    enable_slam: true
    enable_landmarks: true
    verbosity: 1

    # cuVSLAM 内部对 fisheye 做 pinhole+undistort, 在 ~108° HFOV 下误差大导致 stereo
    # matching 不稳, 轨迹跑飞. 打开下面这项用 cv::fisheye::stereoRectify 预先生成
    # 矩形化 pinhole 图, cuvslam 当普通 pinhole 双目处理.
    rectify_fisheye: true

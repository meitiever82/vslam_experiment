# cuVSLAM ROS2 parameters
# Adjust these for your camera setup

cuvslam_ros:
  ros__parameters:
    # Topics
    left_image_topic: "/camera/left/image_raw"
    right_image_topic: "/camera/right/image_raw"
    imu_topic: ""                  # empty to disable IMU
    camera_info_topic: ""          # empty if using manual intrinsics below

    # Frame IDs
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    camera_frame_id: "camera_link"

    # Camera intrinsics (set to 0 to use CameraInfo topic instead)
    image_width: 1280
    image_height: 720
    fx: 554.0
    fy: 554.0
    cx: 640.0
    cy: 360.0
    baseline: 0.12               # stereo baseline in meters

    # Distortion: "pinhole", "brown", "fisheye", "polynomial"
    distortion_model: "pinhole"
    distortion_coeffs: []

    # Tracker
    odometry_mode: "stereo"      # "stereo" or "inertial"
    enable_slam: false
    enable_landmarks: false
    verbosity: 1

    # IMU params (only used when odometry_mode=inertial)
    # gyroscope_noise_density: 1.6968e-4
    # gyroscope_random_walk: 1.9393e-5
    # accelerometer_noise_density: 2.0e-3
    # accelerometer_random_walk: 3.0e-3
    # imu_frequency: 200.0
